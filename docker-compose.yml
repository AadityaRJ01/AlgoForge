version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: algoforge_db
    restart: always
    environment:
      POSTGRES_USER: algoforge_user
      POSTGRES_PASSWORD: algoforge_password
      POSTGRES_DB: algoforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - algoforge_network

  redis:
    image: redis:alpine
    container_name: algoforge_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - algoforge_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algoforge_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://algoforge_user:algoforge_password@db:5432/algoforge_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - algoforge_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algoforge_celery_worker
    restart: always
    command: celery -A app.workers.worker worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://algoforge_user:algoforge_password@db:5432/algoforge_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db
    networks:
      - algoforge_network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algoforge_web
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - algoforge_network

volumes:
  postgres_data:

networks:
  algoforge_network:
    driver: bridge
